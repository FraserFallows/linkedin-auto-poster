name: Monday generic post

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print composed post instead of publishing)'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve dry-run mode
        id: resolve
        run: |
          # Scheduled runs always start as a dry run during the initial review
          # period (see Rollout Plan) - flip this literal to false once Monday's
          # output is consistently trustworthy. Manual runs use whatever the
          # workflow_dispatch input says.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run post script
        env:
          DRY_RUN: ${{ steps.resolve.outputs.dry_run }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: python scripts/post.py --mode generic

      - name: Commit updated state
        if: steps.resolve.outputs.dry_run == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posted.json POSTS.md
          git diff --quiet --cached || git commit -m "Log Monday generic post [skip ci]"
          git push
